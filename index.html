<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <article class="profile-card">

    <img
      class="profile-card__avatar"
      src="C:\Users\User\Downloads\Tajim.jpg.jpeg"
      alt="Photo of Touhid Islam Tajim"
      width="150"
      height="150"
    >

    <h1 class="profile-card__name">Touhid Islam Tajim</h1>

    <p class="profile-card__bio">Frontend Developer &amp; UI Designer</p>

    <ul class="profile-card__stats">
      <li class="profile-card__stat">
        <span class="profile-card__stat-value">100K</span>
        <span class="profile-card__stat-label">Followers</span>
      </li>
      <li class="profile-card__stat">
        <span class="profile-card__stat-value">7</span>
        <span class="profile-card__stat-label">Following</span>
      </li>
    </ul>

    <button class="profile-card__follow-btn" type="button">Follow</button>

  </article>

</body>
</html>
